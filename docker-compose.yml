services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulsedb}
      POSTGRES_USER: ${POSTGRES_USER:-pulseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsepass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

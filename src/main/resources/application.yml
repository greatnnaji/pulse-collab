spring:
  application:
    name: pulse-collab

  datasource:
    url: jdbc:postgresql://localhost:5432/pulsedb
    username: pulseuser
    password: pulsepass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-use-environment-variable}
  expiration: 86400000  # 24 hours in milliseconds


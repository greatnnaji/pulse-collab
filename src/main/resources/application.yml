spring:
  application:
    name: pulse-collab

  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:pulsedb}
    username: ${POSTGRES_USER:pulseuser}
    password: ${POSTGRES_PASSWORD:pulsepass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-123456}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

